<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Deadwax — Vinyl Collections</title>
    <meta name="description" content="Deadwax — share your vinyl collection.">
    <meta name="theme-color" content="#000000">
    <meta property="og:title" content="Deadwax">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 26px 22px 64px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 40px;
      }

      .logo img { height: 18px; display: block; }

      header nav a {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        text-decoration: none;
        margin-left: 18px;
      }

      header nav a:hover { color: var(--text); }

      .tagline {
        font-size: clamp(1.4rem, 3.4vw, 2.1rem);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 6px;
      }

      .sub {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin: 0 0 40px;
      }

      .collections {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 300px));
        justify-content: start;
        gap: 16px;
      }

      /* Animated collection card: a full-bleed cover that shrinks on
         hover/focus to reveal the owner + a Follow button. */
      .card {
        position: relative;
        display: block;
        height: 30rem;
        border: 1px solid var(--border);
        background: var(--panel);
        overflow: hidden;
        text-decoration: none;
        color: var(--text);
      }

      .card__cover {
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.05);
        display: block;
        transition: aspect-ratio 0.35s ease;
      }

      .card__cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 18%;
        filter: grayscale(0.35) contrast(1.02);
        transition: object-position 0.35s ease;
      }

      .card__cover--empty {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card__cover--empty svg { width: 80%; height: 80%; }

      .card:hover .card__cover,
      .card:focus-within .card__cover {
        aspect-ratio: 1 / 1;
      }
      .card:hover .card__cover img,
      .card:focus-within .card__cover img { object-position: 50% 30%; }

      /* Collapsed: name over a gradient band at the bottom of the cover. */
      .card__band {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% - 5rem);
        padding: 14px 16px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0));
        font-size: 1.05rem;
        font-weight: 600;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .card:hover .card__band,
      .card:focus-within .card__band { opacity: 0; transform: translateY(1rem); }

      /* Revealed body. */
      .card__body {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        opacity: 0;
        transform: translateY(14px);
        transition: opacity 0.3s ease 0.05s, transform 0.3s ease 0.05s;
      }
      .card:hover .card__body,
      .card:focus-within .card__body { opacity: 1; transform: none; }

      .card__body h2 { margin: 0; font-size: 1.15rem; font-weight: 600; }

      .card__meta {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0;
      }

      .card__tags { display: flex; flex-wrap: wrap; gap: 6px; }
      .card__tag {
        font-family: var(--font-mono);
        font-size: 0.5625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text);
        border: 1px solid var(--border-strong);
        padding: 3px 7px;
      }

      .card__foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 4px;
      }

      .card__open {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-soft);
      }

      .card__follow {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--text);
        border: 1px solid var(--text);
        color: #000;
        padding: 7px 13px;
        cursor: pointer;
        flex: none;
      }
      .card__follow.is-following {
        background: none;
        color: var(--text-dim);
        border-color: var(--border);
      }

      .status {
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/"><img src="/deadwax.svg" alt="Deadwax"></a>
        <nav>
          <a href="/places">Places</a>
          <a href="/add">Add records</a>
          <a href="/login" id="auth-link">Sign in</a>
        </nav>
      </header>

      <h1 class="tagline">Vinyl collections, side by side.</h1>
      <p class="sub">Scan your records, build your shelf, see what your friends are spinning.</p>

      <div class="collections" id="collections">
        <p class="status">Loading collections…</p>
      </div>
    </div>

    <script type="module" src="/js/explore.js?v=5"></script>
  </body>
</html>
