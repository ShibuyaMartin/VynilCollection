<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Vinilos Shibu</title>
    <meta
      name="description"
      content="A minimal HTML cover-flow archive for Martin Shibuya's vinyl collection."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <link rel="stylesheet" href="./styles.css?v=1775314412">
    <script type="module" src="./app.js?v=1775283900"></script>
    <meta property="og:title" content="Vinilos Shibu">
  </head>
  <body>
    <div class="app-shell">
      <section class="control-strip" aria-label="Collection controls">
        <button class="search-toggle" id="search-toggle" type="button" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        </button>
        <div class="search-overlay" id="search-overlay" hidden>
          <input id="search-input" name="search" type="search" placeholder="Artista, álbum, género..." autocomplete="off">
          <button class="search-close" id="search-close" type="button">✕</button>
        </div>
        <select id="genre-filter" name="genre" hidden><option value="all">All</option></select>
        <select id="style-filter" name="style" hidden><option value="all">All</option></select>
        <button id="reset-filters" type="button" hidden>Reset</button>
      </section>

      <main class="experience-shell">
        <section class="gallery-shell">
          <div class="gallery-ambience" aria-hidden="true"></div>
          <div class="gallery-stage" id="gallery-stage" aria-label="Cover flow vinyl gallery">
            <div class="cover-layer" id="cover-layer"></div>

            <div class="scene-empty" id="scene-empty" hidden>
              <div class="scene-empty__box">
                <h2 class="scene-empty__title">No records match these filters</h2>
                <p class="scene-empty__copy">
                  Reset the filters or search with a broader term.
                </p>
                <button class="scene-empty__button" id="scene-empty-reset" type="button">
                  Reset filters
                </button>
              </div>
            </div>
          </div>

          <div class="transport">
            <button class="transport__button" id="prev-button" type="button" aria-label="Previous record">
              <span>&lsaquo;</span>
            </button>
            <input
              class="transport__slider"
              id="position-slider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              aria-label="Browse position"
            >
            <button class="transport__button" id="next-button" type="button" aria-label="Next record">
              <span>&rsaquo;</span>
            </button>
          </div>
        </section>

        <section class="album-panel" aria-live="polite">
          <div class="album-summary">
            <p class="album-summary__kicker" id="album-number">Record -</p>
            <h1 class="album-summary__title" id="album-title">Pick a record</h1>
            <p class="album-summary__artist" id="album-artist">Artist details will appear here.</p>
            <p class="album-summary__meta" id="album-meta">Genre • Country • Year • Label</p>

            <div class="listen-strip">
              <a class="listen-link" id="spotify-link" href="#" target="_blank" rel="noreferrer">
                Spotify
              </a>
              <a class="listen-link" id="tidal-link" href="#" target="_blank" rel="noreferrer">
                TIDAL
              </a>
              <a class="listen-link" id="discogs-link" href="#" target="_blank" rel="noreferrer" hidden>
                Discogs
              </a>
            </div>
          </div>

          <div class="tracklist-panel">
            <div class="section-heading">
              <h2>Tracklist</h2>
              <p class="tracklist-panel__status" id="tracklist-status">Waiting for a record</p>
            </div>

            <ol class="tracklist-list" id="tracklist-list"></ol>
          </div>

          <div class="player-shell" id="player-shell" hidden>
            <p class="player-label">Escuchar en YouTube</p>
            <div class="player-iframe-wrap" id="player-wrap">
              <div class="player-searching">Buscando...</div>
            </div>
          </div>
        </section>
      </main>

      <details class="tuning-panel" id="tuning-panel" hidden>
        <summary>Scene Tuning</summary>
        <div class="tuning-grid">
          <label class="tuning-field">
            <span>Background Color</span>
            <input data-tuning-key="backgroundGlowColor" type="color">
            <output data-tuning-output="backgroundGlowColor"></output>
          </label>

          <label class="tuning-field">
            <span>Background Glow</span>
            <input data-tuning-key="backgroundGlowStrength" type="range" min="0" max="0.8" step="0.01">
            <output data-tuning-output="backgroundGlowStrength"></output>
          </label>

          <label class="tuning-field">
            <span>Background Blur</span>
            <input data-tuning-key="backgroundGlowBlur" type="range" min="0" max="240" step="1">
            <output data-tuning-output="backgroundGlowBlur"></output>
          </label>

          <label class="tuning-field">
            <span>Background X</span>
            <input data-tuning-key="backgroundGlowX" type="range" min="0" max="100" step="1">
            <output data-tuning-output="backgroundGlowX"></output>
          </label>

          <label class="tuning-field">
            <span>Background Y</span>
            <input data-tuning-key="backgroundGlowY" type="range" min="-20" max="90" step="1">
            <output data-tuning-output="backgroundGlowY"></output>
          </label>

          <label class="tuning-field">
            <span>Background Vignette</span>
            <input data-tuning-key="backgroundVignette" type="range" min="0" max="1" step="0.01">
            <output data-tuning-output="backgroundVignette"></output>
          </label>

          <label class="tuning-field">
            <span>Reflection Opacity</span>
            <input data-tuning-key="reflectionOpacity" type="range" min="0" max="1" step="0.01">
            <output data-tuning-output="reflectionOpacity"></output>
          </label>

          <label class="tuning-field">
            <span>Center Opacity</span>
            <input data-tuning-key="centerReflectionOpacity" type="range" min="0" max="1" step="0.01">
            <output data-tuning-output="centerReflectionOpacity"></output>
          </label>

          <label class="tuning-field">
            <span>Near Opacity</span>
            <input data-tuning-key="nearReflectionOpacity" type="range" min="0" max="1" step="0.01">
            <output data-tuning-output="nearReflectionOpacity"></output>
          </label>

          <label class="tuning-field">
            <span>Far Opacity</span>
            <input data-tuning-key="farReflectionOpacity" type="range" min="0" max="1" step="0.01">
            <output data-tuning-output="farReflectionOpacity"></output>
          </label>

          <label class="tuning-field">
            <span>Center Blur</span>
            <input data-tuning-key="centerReflectionBlur" type="range" min="0" max="24" step="1">
            <output data-tuning-output="centerReflectionBlur"></output>
          </label>

          <label class="tuning-field">
            <span>Near Blur</span>
            <input data-tuning-key="nearReflectionBlur" type="range" min="0" max="24" step="1">
            <output data-tuning-output="nearReflectionBlur"></output>
          </label>

          <label class="tuning-field">
            <span>Far Blur</span>
            <input data-tuning-key="farReflectionBlur" type="range" min="0" max="24" step="1">
            <output data-tuning-output="farReflectionBlur"></output>
          </label>

          <label class="tuning-field">
            <span>Active Strength</span>
            <input data-tuning-key="activeStrength" type="range" min="0" max="0.012" step="0.0005">
            <output data-tuning-output="activeStrength"></output>
          </label>

          <label class="tuning-field">
            <span>Side Strength</span>
            <input data-tuning-key="sideStrength" type="range" min="0" max="0.006" step="0.0005">
            <output data-tuning-output="sideStrength"></output>
          </label>

          <label class="tuning-field">
            <span>Active Gap</span>
            <input data-tuning-key="activeGap" type="range" min="0" max="24" step="1">
            <output data-tuning-output="activeGap"></output>
          </label>

          <label class="tuning-field">
            <span>Side Gap</span>
            <input data-tuning-key="sideGap" type="range" min="0" max="24" step="1">
            <output data-tuning-output="sideGap"></output>
          </label>

          <label class="tuning-field">
            <span>Fade Height</span>
            <input data-tuning-key="fadeHeight" type="range" min="8" max="30" step="1">
            <output data-tuning-output="fadeHeight"></output>
          </label>

          <label class="tuning-field">
            <span>Fade Blur</span>
            <input data-tuning-key="fadeBlur" type="range" min="0" max="18" step="1">
            <output data-tuning-output="fadeBlur"></output>
          </label>

          <label class="tuning-field">
            <span>Fade Top</span>
            <input data-tuning-key="fadeTop" type="range" min="0" max="0.25" step="0.01">
            <output data-tuning-output="fadeTop"></output>
          </label>

          <label class="tuning-field">
            <span>Fade Mid</span>
            <input data-tuning-key="fadeMid" type="range" min="0.2" max="0.9" step="0.01">
            <output data-tuning-output="fadeMid"></output>
          </label>

          <label class="tuning-field">
            <span>Fade Bottom</span>
            <input data-tuning-key="fadeBottom" type="range" min="0" max="0.7" step="0.01">
            <output data-tuning-output="fadeBottom"></output>
          </label>

          <label class="tuning-field">
            <span>Edge Fade</span>
            <input data-tuning-key="edgeDark" type="range" min="0.4" max="1" step="0.01">
            <output data-tuning-output="edgeDark"></output>
          </label>

          <label class="tuning-field">
            <span>Center Fade</span>
            <input data-tuning-key="centerDark" type="range" min="0" max="0.3" step="0.01">
            <output data-tuning-output="centerDark"></output>
          </label>
        </div>

        <textarea class="tuning-output" id="tuning-output" readonly></textarea>

        <div class="tuning-actions">
          <button class="tuning-button" id="tuning-copy" type="button">Copy values</button>
          <button class="tuning-button tuning-button--ghost" id="tuning-reset" type="button">Reset</button>
        </div>
      </details>
    </div>
  </body>
</html>
