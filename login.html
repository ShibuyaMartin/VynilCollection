<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Sign In — Deadwax</title>
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: min(420px, 100%);
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .kicker {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        margin: 4px 0 0;
        letter-spacing: -0.01em;
      }

      form { display: flex; flex-direction: column; gap: 12px; }

      input {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        padding: 13px 14px;
        outline: none;
        -webkit-appearance: none;
      }

      input:focus { border-color: var(--border-strong); }
      input::placeholder { color: var(--text-dim); }

      button {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid var(--text);
        border-radius: 0;
        padding: 14px 18px;
        cursor: pointer;
        background: var(--text);
        color: #000;
      }

      button:disabled { opacity: 0.4; cursor: default; }

      .hint { color: var(--text-dim); font-size: 0.8125rem; margin: 0; line-height: 1.5; }
      .error { color: var(--text-soft); font-size: 0.8125rem; margin: 0; min-height: 1em; }
      .error:not(:empty)::before { content: "! "; font-family: var(--font-mono); }

      a { color: var(--text-dim); font-family: var(--font-mono); font-size: 0.75rem; }

      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <div>
        <p class="kicker">Deadwax</p>
        <h1 id="login-heading">Sign in</h1>
      </div>

      <!-- Step 1: request a magic link -->
      <form id="email-form">
        <input id="email-input" name="email" type="email" placeholder="your@email.com" autocomplete="email" required>
        <button type="submit" id="email-submit">Send magic link</button>
        <p class="hint">No passwords — you'll get a sign-in link by email.</p>
      </form>

      <!-- Step 2: code sent -->
      <form id="code-form" hidden>
        <p class="hint" id="sent-copy"></p>
        <input id="code-input" name="code" type="text" inputmode="numeric" autocomplete="one-time-code"
               placeholder="Sign-in code" maxlength="10" pattern="[0-9]{6,10}" required>
        <button type="submit" id="code-submit">Verify code</button>
        <p class="hint">Or open the link in the email — both work.</p>
      </form>

      <!-- Step 3: first login, choose a username -->
      <form id="profile-form" hidden>
        <input id="username-input" name="username" type="text" placeholder="username (a-z, 0-9, dashes)"
               autocomplete="off" autocapitalize="none" spellcheck="false" required>
        <input id="display-name-input" name="displayName" type="text" placeholder="Display name" autocomplete="name">
        <button type="submit" id="profile-submit">Create profile</button>
        <p class="hint">Your collection will live at /u/username — choose wisely, it can't be changed later.</p>
      </form>

      <p class="error" id="login-error"></p>
      <a href="/">&larr; Back to collections</a>
    </div>

    <script type="module" src="/js/login.js?v=3"></script>
  </body>
</html>
