<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Stats — Deadwax</title>
    <meta name="description" content="Collection stats on Deadwax.">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 26px 22px 64px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 40px;
      }

      .logo img { height: 18px; display: block; }

      header nav a {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        text-decoration: none;
        margin-left: 18px;
      }

      header nav a:hover { color: var(--text); }

      .page-title {
        font-size: clamp(1.4rem, 3.4vw, 2.1rem);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 6px;
      }

      .page-sub {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0 0 40px;
      }

      .status {
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 0.75rem;
      }

      .boards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .board {
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 18px;
        min-width: 0;
      }

      .board--wide { grid-column: 1 / -1; }

      .board h2 {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0 0 16px;
      }

      .board h2 strong {
        color: var(--text);
        font-weight: 600;
      }

      @media (max-width: 720px) {
        .boards { grid-template-columns: 1fr; }
      }

      /* Heatmap */
      .heatmap-scroll { overflow-x: auto; }
      .heatmap-scroll svg { display: block; }
      .heatmap-note {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 10px 0 0;
      }

      /* Horizontal bars */
      .bars { display: flex; flex-direction: column; gap: 9px; }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(90px, 38%) 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .bar-row .label {
        font-size: 0.8125rem;
        color: var(--text-soft);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bar-row .track { height: 12px; background: rgba(255, 255, 255, 0.04); }

      .bar-row .fill { height: 100%; background: var(--text); }

      .bar-row .count {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--text-dim);
        min-width: 2ch;
        text-align: right;
      }

      /* Decades columns */
      .columns {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        height: 170px;
      }

      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        gap: 6px;
        height: 100%;
        min-width: 0;
      }

      .column .pillar {
        width: 100%;
        background: var(--text);
        min-height: 2px;
      }

      .column.is-empty .pillar { background: rgba(255, 255, 255, 0.07); }

      .column .value {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        color: var(--text-dim);
      }

      .column .tick {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.05em;
        color: var(--text-dim);
      }

      /* Genre mosaic */
      .mosaic {
        position: relative;
        width: 100%;
        max-width: 430px;
        aspect-ratio: 1;
        border: 1px solid var(--border-strong);
        overflow: hidden;
      }

      .mosaic .tile {
        position: absolute;
        background-size: cover;
        background-position: center;
        background-color: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 0 0 1px #000;
      }

      .mosaic .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
      }

      .mosaic .tile span {
        position: absolute;
        left: 7px;
        bottom: 5px;
        z-index: 1;
        font-family: var(--font-mono);
        font-size: 0.5625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text);
        text-shadow: 0 1px 4px #000;
        max-width: calc(100% - 14px);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .mosaic-note {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/"><img src="/deadwax.svg" alt="Deadwax"></a>
        <nav>
          <a href="/" id="back-link">Back to collection</a>
        </nav>
      </header>

      <h1 class="page-title" id="page-title">Stats</h1>
      <p class="page-sub" id="page-sub">&nbsp;</p>

      <div id="boards-root">
        <p class="status">Crunching the shelf…</p>
      </div>
    </div>

    <script type="module" src="/js/stats.js?v=1"></script>
  </body>
</html>
