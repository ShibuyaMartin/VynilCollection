<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Places — Deadwax</title>
    <meta name="description" content="Record stores, vinyl fairs and listening cafés near you.">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      [hidden] { display: none !important; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 26px 22px 64px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 40px;
      }

      .logo img { height: 18px; display: block; }

      header nav a {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        text-decoration: none;
        margin-left: 18px;
      }

      header nav a:hover { color: var(--text); }

      .tagline {
        font-size: clamp(1.4rem, 3.4vw, 2.1rem);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 6px;
      }

      .sub {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin: 0 0 28px;
      }

      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .search-row input {
        flex: 1;
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        padding: 12px 14px;
        outline: none;
        -webkit-appearance: none;
      }

      .search-row input:focus { border-color: var(--border-strong); }
      .search-row input::placeholder { color: var(--text-dim); }

      button {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text-soft);
        padding: 12px 16px;
        cursor: pointer;
      }

      button.primary {
        background: var(--text);
        border-color: var(--text);
        color: #000;
      }

      button:disabled { opacity: 0.4; cursor: wait; }

      .locate-row { margin-bottom: 28px; }

      .status {
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        margin: 0 0 18px;
        min-height: 1em;
      }

      .place-list { display: flex; flex-direction: column; gap: 10px; }

      .place {
        border: 1px solid var(--border);
        background: var(--panel);
      }

      .place-head {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px;
        cursor: pointer;
      }

      .place-thumb {
        width: 56px;
        height: 56px;
        flex: none;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        filter: grayscale(0.4) contrast(1.05);
      }

      .place-text {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .place-toprow {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .place-head h2 {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 600;
        line-height: 1.3;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .place-head .distance {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--text-dim);
        text-align: right;
        white-space: nowrap;
        flex: none;
      }

      .place-head .meta {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-dim);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .place-head .meta .stars { color: var(--text-soft); }

      .place-body {
        border-top: 1px solid var(--border);
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .place-links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .place-links a {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-soft);
      }

      .place-links a:hover { color: var(--text); }

      .review {
        display: flex;
        gap: 10px;
        align-items: baseline;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        padding-bottom: 8px;
        font-size: 0.8125rem;
      }

      .review .author {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-dim);
        text-decoration: none;
        flex: none;
      }

      .review .rating { color: var(--text-soft); flex: none; }
      .review .body { margin: 0; color: var(--text-soft); line-height: 1.5; overflow-wrap: anywhere; }

      .review-form {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .review-form select {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        padding: 9px 8px;
        border-radius: 0;
      }

      .review-form input {
        flex: 1;
        min-width: 160px;
        background: none;
        border: none;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 0.875rem;
        padding: 8px 0;
        outline: none;
      }

      .note { font-size: 0.75rem; color: var(--text-dim); margin: 0; }
      .note a { color: var(--text-soft); }

      .add-place {
        margin-top: 36px;
        border-top: 1px solid var(--border);
        padding-top: 22px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .add-place h2 {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0;
      }

      .add-place .row { display: flex; gap: 8px; flex-wrap: wrap; }

      .add-place input, .add-place select {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        padding: 11px 12px;
        outline: none;
        -webkit-appearance: none;
      }

      .add-place input { flex: 1; min-width: 150px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/"><img src="/deadwax.svg" alt="Deadwax"></a>
        <nav>
          <a href="/explore">Explore</a>
          <a href="/login" id="auth-link">Sign in</a>
        </nav>
      </header>

      <h1 class="tagline">Dig in the wild.</h1>
      <p class="sub">Record stores, vinyl fairs and listening cafés near you — rated by collectors.</p>

      <form class="search-row" id="search-form">
        <input id="search-input" name="q" type="search" placeholder="City or neighborhood" autocomplete="off">
        <button type="submit" class="primary">Search</button>
      </form>
      <div class="locate-row">
        <button id="locate-button" type="button">Use my location</button>
      </div>

      <p class="status" id="status"></p>
      <div class="place-list" id="place-list"></div>

      <div class="add-place" id="add-place" hidden>
        <h2>Missing a spot? Add it</h2>
        <p class="note">It gets pinned to the searched area — fairs and listening cafés welcome.</p>
        <div class="row">
          <input id="add-name" name="place-name" placeholder="Name" maxlength="120" autocomplete="off">
          <select id="add-kind" name="place-kind">
            <option value="store">Record store</option>
            <option value="fair">Vinyl fair</option>
            <option value="cafe">Listening café</option>
          </select>
        </div>
        <div class="row">
          <input id="add-website" name="place-website" placeholder="Website or Instagram (optional)" maxlength="300" autocomplete="off">
          <button id="add-submit" type="button" class="primary">Add place</button>
        </div>
        <p class="note" id="add-status"></p>
      </div>
      <p class="note" id="add-signin" hidden><a href="/login?next=/places">Sign in</a> to add places and rate them.</p>
    </div>

    <script type="module" src="/js/places.js?v=2"></script>
  </body>
</html>
