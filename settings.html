<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Settings — Deadwax</title>
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }
      [hidden] { display: none !important; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
      }

      .wrap { max-width: 720px; margin: 0 auto; padding: 26px 22px 80px; }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 40px;
      }

      .logo img { height: 18px; display: block; }

      header nav a {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        text-decoration: none;
        margin-left: 18px;
      }
      header nav a:hover { color: var(--text); }

      h1.page-title {
        font-size: clamp(1.4rem, 3.4vw, 2.1rem);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 32px;
      }

      .card {
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 20px;
        margin-bottom: 16px;
      }

      .card h2 {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0 0 18px;
      }

      label.field {
        display: block;
        margin-bottom: 16px;
      }

      label.field > span {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 6px;
      }

      input, textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 0;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        padding: 11px 13px;
        outline: none;
        -webkit-appearance: none;
      }
      input:focus, textarea:focus { border-color: var(--border-strong); }
      input::placeholder, textarea::placeholder { color: var(--text-dim); }
      textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

      .username-row { display: flex; align-items: center; gap: 6px; }
      .username-row .at { color: var(--text-dim); font-size: 1rem; }

      .roles { display: flex; gap: 8px; flex-wrap: wrap; }
      .role-chip {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        color: var(--text-soft);
        padding: 9px 16px;
        cursor: pointer;
      }
      .role-chip.is-on {
        background: var(--text);
        border-color: var(--text);
        color: #000;
      }

      label.field.toggle-field {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .toggle-field input { width: auto; flex: none; }
      label.field.toggle-field > .toggle-text {
        margin: 0;
        font-size: 0.9rem;
        color: var(--text-soft);
        text-transform: none;
        letter-spacing: 0;
      }

      .links-grid { display: flex; flex-direction: column; gap: 8px; }
      .link-input { display: flex; align-items: center; gap: 8px; }
      .link-input .prefix {
        flex: none;
        width: 30px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--text-dim);
      }

      button {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text-soft);
        padding: 11px 16px;
        cursor: pointer;
      }
      button.primary { background: var(--text); border-color: var(--text); color: #000; }
      button:disabled { opacity: 0.45; cursor: wait; }

      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

      .note { font-size: 0.75rem; color: var(--text-dim); margin: 8px 0 0; min-height: 1em; }
      .note.ok { color: var(--text-soft); }

      /* Avatar */
      .avatar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
      .avatar {
        width: 72px;
        height: 72px;
        flex: none;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 1.4rem;
        color: var(--text-dim);
        overflow: hidden;
      }
      .avatar img { width: 100%; height: 100%; object-fit: cover; }
      .avatar svg { width: 100%; height: 100%; display: block; }

      /* Stats summary */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .stat { border: 1px solid var(--border); padding: 14px; }
      .stat .num { font-size: 1.5rem; font-weight: 600; }
      .stat .lbl {
        font-family: var(--font-mono);
        font-size: 0.5625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-top: 4px;
      }

      /* Wantlist */
      .want-results, .want-list { display: flex; flex-direction: column; gap: 8px; }
      .want-results { margin-top: 10px; }
      .want-list { margin-top: 14px; }

      .want-item {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--border);
        padding: 8px;
      }
      .want-item img {
        width: 44px; height: 44px; flex: none; object-fit: cover;
        background: rgba(255, 255, 255, 0.06);
      }
      .want-item .meta { flex: 1; min-width: 0; }
      .want-item .meta strong {
        display: block; font-size: 0.85rem; font-weight: 600;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .want-item .meta span {
        display: block; font-family: var(--font-mono); font-size: 0.625rem;
        color: var(--text-dim); margin-top: 2px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .want-item .controls { display: flex; align-items: center; gap: 6px; flex: none; }
      .want-item select, .want-item input {
        width: auto; font-size: 0.75rem; padding: 6px 8px;
        font-family: var(--font-mono);
      }
      .want-item input.price { width: 88px; }
      .want-item button { padding: 7px 10px; font-size: 0.6rem; }

      .priority-tag {
        font-family: var(--font-mono);
        font-size: 0.5625rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 3px 7px;
        border: 1px solid var(--border);
        color: var(--text-dim);
        flex: none;
      }
      .priority-1 { color: var(--text); border-color: var(--border-strong); }

      .status { color: var(--text-dim); font-family: var(--font-mono); font-size: 0.75rem; }

      .danger-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px; flex-wrap: wrap;
      }
      .sign-out { color: var(--text-soft); }
      .sign-out:hover { background: var(--text); border-color: var(--text); color: #000; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/"><img src="/deadwax.svg" alt="Deadwax"></a>
        <nav>
          <a href="#" id="collection-link">My collection</a>
          <a href="/explore">Explore</a>
        </nav>
      </header>

      <h1 class="page-title">Settings</h1>

      <div id="settings-root">
        <p class="status">Loading…</p>
      </div>

      <template id="settings-template">
        <!-- Profile -->
        <section class="card">
          <h2>Profile</h2>
          <div class="avatar-row">
            <div class="avatar" id="avatar"></div>
            <div>
              <div class="row">
                <button type="button" id="avatar-button">Upload photo</button>
                <button type="button" id="avatar-randomize">↻ Randomize</button>
              </div>
              <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp" hidden>
              <p class="note" id="avatar-note"></p>
            </div>
          </div>

          <label class="field">
            <span>Display name</span>
            <input id="display-name" maxlength="60" placeholder="Your name">
          </label>

          <label class="field">
            <span>Username</span>
            <span class="username-row"><span class="at">@</span>
              <input id="username" maxlength="30" autocapitalize="off" autocomplete="off" placeholder="username">
            </span>
          </label>

          <label class="field">
            <span>Bio</span>
            <textarea id="bio" maxlength="280" placeholder="A line about your collection"></textarea>
          </label>

          <div class="field">
            <span>I am a…</span>
            <div class="roles" id="roles">
              <button type="button" class="role-chip" data-role="collector">Collector</button>
              <button type="button" class="role-chip" data-role="dj">DJ</button>
              <button type="button" class="role-chip" data-role="store">Store</button>
            </div>
          </div>

          <label class="field">
            <span>City</span>
            <input id="city" maxlength="80" placeholder="Buenos Aires">
          </label>

          <label class="field toggle-field">
            <input type="checkbox" id="open-to-offers">
            <span class="toggle-text">Open to trades &amp; offers</span>
          </label>

          <div class="field">
            <span>Links</span>
            <div class="links-grid">
              <div class="link-input"><span class="prefix">@</span><input id="link-instagram" maxlength="120" placeholder="Instagram handle or URL" autocomplete="off"></div>
              <div class="link-input"><span class="prefix">SC</span><input id="link-soundcloud" maxlength="200" placeholder="SoundCloud URL" autocomplete="off"></div>
              <div class="link-input"><span class="prefix">↗</span><input id="link-website" maxlength="200" placeholder="Website" autocomplete="off"></div>
            </div>
          </div>

          <div class="row">
            <button type="button" class="primary" id="save-profile">Save profile</button>
          </div>
          <p class="note" id="profile-note"></p>
        </section>

        <!-- Stats -->
        <section class="card">
          <h2>Your collection</h2>
          <div class="stat-grid">
            <div class="stat"><div class="num" id="stat-records">—</div><div class="lbl">Records</div></div>
            <div class="stat"><div class="num" id="stat-genre">—</div><div class="lbl">Top genre</div></div>
            <div class="stat"><div class="num" id="stat-followers">—</div><div class="lbl">Followers</div></div>
          </div>
          <div class="row">
            <a id="stats-link"><button type="button">Full stats →</button></a>
          </div>
        </section>

        <!-- Wantlist -->
        <section class="card">
          <h2>Wantlist</h2>
          <form class="row" id="want-search-form">
            <input id="want-search" placeholder="Search a record to want…" autocomplete="off" style="flex:1;min-width:160px">
            <button type="submit">Search</button>
          </form>
          <div class="want-results" id="want-results"></div>
          <div class="want-list" id="want-list"></div>
          <p class="note" id="want-note"></p>
        </section>

        <!-- Account -->
        <section class="card">
          <h2>Account</h2>
          <div class="danger-row">
            <span class="status" id="account-email">Signed in</span>
            <button type="button" class="sign-out" id="sign-out">Sign out</button>
          </div>
        </section>
      </template>
    </div>

    <script type="module" src="/js/settings.js?v=6"></script>
  </body>
</html>
