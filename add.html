<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Add Record — Vinilos Shibu</title>
    <meta name="description" content="Scan a vinyl barcode and add it to the collection.">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.2);
        --text: #f3ede3;
        --text-soft: rgba(243, 237, 227, 0.78);
        --text-dim: rgba(243, 237, 227, 0.42);
        --font-sans: "Geist", system-ui, sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .wrap {
        width: min(560px, 100%);
        padding: 20px 20px 56px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .kicker {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 4px 0 0;
        letter-spacing: -0.01em;
      }

      header a {
        color: var(--text-dim);
        text-decoration: none;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.04em;
      }

      .step { display: none; flex-direction: column; gap: 16px; }
      .step.active { display: flex; }

      .scanner-shell {
        position: relative;
        border: 1px solid var(--border);
        overflow: hidden;
        background: #000;
        aspect-ratio: 3 / 4;
        max-height: 56dvh;
      }

      .scanner-shell video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .scan-frame {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .scan-frame::before {
        content: "";
        width: 78%;
        height: 30%;
        border: 1px solid rgba(243, 237, 227, 0.9);
        box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.4);
      }

      .scan-status {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 12px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(243, 237, 227, 0.85);
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }

      .field-row { display: flex; gap: 8px; }

      input[type="text"], input[type="search"], input[type="password"], select {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        padding: 12px 14px;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
      }

      input:focus, select:focus { border-color: var(--border-strong); }
      input::placeholder { color: var(--text-dim); }

      button {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 14px 18px;
        cursor: pointer;
        background: transparent;
        color: var(--text-soft);
      }

      button.primary {
        background: var(--text);
        border-color: var(--text);
        color: #000;
      }

      button.ghost { color: var(--text-dim); }
      button:disabled { opacity: 0.4; cursor: default; }

      .hint {
        color: var(--text-dim);
        font-size: 0.8125rem;
        margin: 0;
        line-height: 1.5;
      }

      .error { color: var(--text-soft); font-size: 0.8125rem; margin: 0; min-height: 1em; }
      .error:not(:empty)::before { content: "! "; font-family: var(--font-mono); }

      .candidate-list { display: flex; flex-direction: column; gap: 8px; }

      .candidate {
        display: flex;
        gap: 14px;
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 10px;
        text-align: left;
        text-transform: none;
        letter-spacing: normal;
        font-family: var(--font-sans);
      }

      .candidate img {
        width: 64px;
        height: 64px;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.06);
        flex: none;
        filter: grayscale(0.2);
      }

      .candidate .meta { min-width: 0; }

      .candidate .meta strong {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1.35;
        color: var(--text);
      }

      .candidate .meta span {
        display: block;
        color: var(--text-dim);
        font-size: 0.75rem;
        margin-top: 4px;
        line-height: 1.4;
      }

      .confirm-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        border: 1px solid var(--border);
        padding: 18px;
      }

      .confirm-card img {
        width: 100%;
        max-width: 280px;
        align-self: center;
        border: 1px solid var(--border);
      }

      .confirm-card h2 {
        margin: 0;
        font-size: 1.0625rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .confirm-card .sub {
        color: var(--text-dim);
        font-size: 0.8125rem;
        margin: 0;
        line-height: 1.5;
      }

      .condition-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .condition-grid label {
        display: flex;
        flex-direction: column;
        gap: 7px;
        font-family: var(--font-mono);
        font-size: 0.625rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .tracklist-preview {
        margin: 0;
        padding-left: 18px;
        color: var(--text-dim);
        font-size: 0.8125rem;
        line-height: 1.6;
        max-height: 130px;
        overflow: auto;
      }

      .success-card {
        border: 1px solid var(--border);
        padding: 28px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .success-card .badge {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .success-card h2 {
        margin: 0;
        font-size: 1.0625rem;
        font-weight: 600;
      }

      .success-card p {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.8125rem;
        line-height: 1.5;
      }

      .success-card a {
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.04em;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--text);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 8px auto;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <p class="kicker">Vinilos Shibu</p>
          <h1>Add Record</h1>
        </div>
        <a id="back-link" href="./">← Collection</a>
      </header>

      <!-- Step 1: scan -->
      <section class="step active" id="step-scan">
        <div class="scanner-shell" id="scanner-shell" hidden>
          <video id="scanner-video" playsinline muted></video>
          <div class="scan-frame"></div>
          <p class="scan-status" id="scan-status">Point at the barcode</p>
        </div>

        <button class="primary" id="start-scan" type="button">Scan barcode</button>
        <button class="ghost" id="stop-scan" type="button" hidden>Stop camera</button>

        <p class="hint">No barcode, or not scanning? Type it below, or search by artist and title:</p>
        <form class="field-row" id="manual-form">
          <input
            id="manual-input"
            name="query"
            type="search"
            placeholder="Barcode or 'artist title'"
            autocomplete="off"
          >
          <button type="submit">Search</button>
        </form>
        <p class="error" id="scan-error"></p>
      </section>

      <!-- Step 2: candidates -->
      <section class="step" id="step-candidates">
        <p class="hint" id="candidates-heading"></p>
        <div class="candidate-list" id="candidate-list"></div>
        <button class="ghost" id="candidates-back" type="button">← Back to scanner</button>
      </section>

      <!-- Step 3: confirm -->
      <section class="step" id="step-confirm">
        <div class="confirm-card" id="confirm-card"></div>
        <div class="condition-grid">
          <label>
            Sleeve condition
            <select id="cover-condition">
              <option>M</option><option>NM</option><option>EX</option>
              <option selected>VG+</option><option>VG</option><option>G</option>
            </select>
          </label>
          <label>
            Media condition
            <select id="disc-condition">
              <option>M</option><option>NM</option><option>EX</option>
              <option selected>VG+</option><option>VG</option><option>G</option>
            </select>
          </label>
        </div>
        <input id="comment-input" name="comment" type="text" placeholder="Comment (optional)" autocomplete="off">
        <div id="admin-token-row">
          <input id="admin-token-input" name="admin-token" type="password" placeholder="Admin token" autocomplete="off">
          <p class="hint">First time only: paste the admin token. It is stored on this device.</p>
        </div>
        <button class="primary" id="confirm-add" type="button">Add to collection</button>
        <button class="ghost" id="confirm-back" type="button">← Pick another</button>
        <p class="error" id="confirm-error"></p>
      </section>

      <!-- Step 4: done -->
      <section class="step" id="step-done">
        <div class="success-card" id="success-card"></div>
        <button class="primary" id="scan-another" type="button">Scan another</button>
      </section>
    </div>

    <script type="module" src="./add.js?v=1781135000"></script>
  </body>
</html>
